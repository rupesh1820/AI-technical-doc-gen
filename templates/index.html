<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Technical Documentation Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            margin-bottom: 30px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
            transition: border-color 0.3s;
        }

        select:focus {
            outline: none;
            border-color: #667eea;
        }

        .slider-group {
            margin: 20px 0;
        }

        .slider-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
        }

        input[type="range"] {
            width: 100%;
            height: 6px;
            background: #e0e0e0;
            outline: none;
            border-radius: 3px;
            -webkit-appearance: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
        }

        input[type="range"]::-moz-range-thumb {
            width: 20px;
            height: 20px;
            background: #667eea;
            border-radius: 50%;
            cursor: pointer;
            border: none;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .secondary-btn {
            background: #764ba2;
        }

        .secondary-btn:hover {
            background: #653a8a;
        }

        #output {
            background: #f5f5f5;
            padding: 20px;
            border-radius: 6px;
            max-height: 500px;
            overflow-y: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.6;
            color: #333;
            border-left: 4px solid #667eea;
        }

        .output-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .output-actions button {
            flex: 1;
            padding: 10px;
            font-size: 14px;
        }

        .loading {
            text-align: center;
            color: #667eea;
            font-weight: 600;
            margin: 20px 0;
        }

        .spinner {
            border: 4px solid #e0e0e0;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #c33;
            margin: 15px 0;
        }

        .success {
            background: #efe;
            color: #3c3;
            padding: 15px;
            border-radius: 6px;
            border-left: 4px solid #3c3;
            margin: 15px 0;
        }

        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .button-group {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📚 Technical Documentation Generator</h1>
            <p>Convert your feature ideas into professional documentation instantly</p>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>📝 Input</h2>
                
                <div class="form-group">
                    <label for="example">Select Template or Custom:</label>
                    <select id="example" onchange="updateExample()">
                        <option value="custom">Custom</option>
                        <option value="auth">User Authentication System</option>
                        <option value="chat">Real-time Chat Application</option>
                        <option value="ecommerce">E-commerce Shopping Cart</option>
                        <option value="upload">File Upload Service</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="feature">Feature Description:</label>
                    <textarea id="feature" rows="8" placeholder="Enter your feature description here..."></textarea>
                </div>

                <div class="slider-group">
                    <div class="slider-label">
                        <span>🎯 Creativity Level</span>
                        <span id="tempValue">0.0</span>
                    </div>
                    <input type="range" id="temperature" min="0" max="1" step="0.1" value="0" oninput="updateTemp()">
                </div>

                <div class="button-group">
                    <button onclick="generateDocs()">🚀 Generate</button>
                </div>
            </div>

            <div class="card">
                <h2>📄 Output</h2>
                <div id="output" style="display: none;"></div>
                <div id="placeholder" style="color: #999; text-align: center; padding: 60px 20px;">
                    Generated documentation will appear here...
                </div>
                <div id="loading" class="loading" style="display: none;">
                    <div class="spinner"></div>
                    Generating documentation...
                </div>
                <div id="message"></div>
                <div class="output-actions" id="actions" style="display: none;">
                    <button class="secondary-btn" onclick="copyOutput()">📋 Copy</button>
                    <button class="secondary-btn" onclick="downloadOutput()">⬇️ Download</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const examples = {
            auth: "A secure user authentication system with login, registration, password reset, and two-factor authentication support.",
            chat: "A real-time messaging platform that supports direct messages, group chats, file sharing, and typing indicators.",
            ecommerce: "A shopping cart system with product selection, inventory management, discount codes, and order processing.",
            upload: "A file upload service with virus scanning, storage management, sharing capabilities, and version control."
        };

        function updateExample() {
            const value = document.getElementById("example").value;
            const textarea = document.getElementById("feature");
            if (value === "custom") {
                textarea.value = "";
            } else {
                textarea.value = examples[value];
            }
        }

        function updateTemp() {
            document.getElementById("tempValue").textContent = 
                document.getElementById("temperature").value;
        }

        async function generateDocs() {
            const feature = document.getElementById("feature").value.trim();
            const temperature = document.getElementById("temperature").value;
            const message = document.getElementById("message");
            const output = document.getElementById("output");
            const loading = document.getElementById("loading");
            const placeholder = document.getElementById("placeholder");
            const actions = document.getElementById("actions");

            if (!feature) {
                message.innerHTML = '<div class="error">❌ Please enter a feature description</div>';
                return;
            }

            message.innerHTML = "";
            loading.style.display = "block";
            output.style.display = "none";
            placeholder.style.display = "none";
            actions.style.display = "none";

            try {
                const response = await fetch("/generate", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ feature, temperature })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || "Error generating documentation");
                }

                output.textContent = data.documentation;
                output.style.display = "block";
                actions.style.display = "flex";
                message.innerHTML = '<div class="success">✅ Documentation generated successfully!</div>';
            } catch (error) {
                message.innerHTML = `<div class="error">❌ ${error.message}</div>`;
            } finally {
                loading.style.display = "none";
            }
        }

        function copyOutput() {
            const output = document.getElementById("output").textContent;
            navigator.clipboard.writeText(output).then(() => {
                alert("✅ Copied to clipboard!");
            });
        }

        function downloadOutput() {
            const output = document.getElementById("output").textContent;
            const blob = new Blob([output], { type: "text/markdown" });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "documentation.md";
            a.click();
            window.URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
